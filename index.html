<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Meme God Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  touch-action:none;
  overscroll-behavior:none;
  background:#020617;
  font-family:sans-serif;
  color:#fff;
}
body{
  display:flex;justify-content:center;align-items:center;
  background:
    radial-gradient(circle at 20% 10%, rgba(56,189,248,.4), transparent 30%),
    radial-gradient(circle at 80% 20%, rgba(168,85,247,.35), transparent 30%),
    radial-gradient(circle at 50% 100%, rgba(34,197,94,.25), transparent 35%),
    #020617;
}
.app{width:100%;max-width:430px;padding:14px;text-align:center}
h1{font-size:26px;margin-bottom:8px;text-shadow:0 0 16px #38bdf8}
.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border-radius:14px;
  border:1px solid rgba(255,255,255,.15);
  padding:8px;
}
.card span{font-size:12px;color:#94a3b8}
.card b{font-size:20px}
canvas{
  width:min(96vw,430px);
  height:min(96vw,430px);
  background:#020617;
  border:3px solid #38bdf8;
  border-radius:20px;
  box-shadow:0 0 25px #38bdf8;
  display:block;
  margin:10px auto;
  touch-action:none;
}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
button{
  padding:12px;border:none;border-radius:14px;
  font-weight:bold;color:#fff;
  background:linear-gradient(135deg,#2563eb,#38bdf8);
}
button:active{transform:scale(.95)}
.pause{background:linear-gradient(135deg,#f59e0b,#f97316)}
.restart{background:linear-gradient(135deg,#ef4444,#fb7185)}
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;justify-content:center;align-items:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  visibility:hidden;
}
.modal.show{visibility:visible}
.modal-box{
  background:#020617;
  padding:20px;border-radius:16px;
  box-shadow:0 0 20px #38bdf8;
}
</style>
</head>

<body>
<div class="app">
<h1>🐍 Snake Meme God Pro</h1>

<div class="hud">
<div class="card"><span>分數</span><b id="score">0</b></div>
<div class="card"><span>最高</span><b id="best">0</b></div>
<div class="card"><span>速度</span><b id="speed">1x</b></div>
</div>

<canvas id="game"></canvas>

<div class="controls">
<button onclick="startGame()">開始</button>
<button class="pause" onclick="pauseGame()">暫停</button>
<button class="restart" onclick="resetGame()">重開</button>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h2>Game Over</h2>
<p id="finalScore"></p>
<button onclick="closeModal()">OK</button>
</div>
</div>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const size=420;
canvas.width=size;
canvas.height=size;

const box=24;
const grid=size/box;

let snake=[{x:box*5,y:box*5}];
let dx=0,dy=0,nextDx=0,nextDy=0;
let food;
let score=0;
let best=Number(localStorage.getItem("best")||0);
let speed=140;
let running=false;
let paused=false;
let gameOver=false;
let acc=0,last=0,loopId;

const snakeImg=new Image();
snakeImg.src="snake.png";
let snakeLoaded=false;
snakeImg.onload=()=>snakeLoaded=true;

const foodImg=new Image();
foodImg.src="food.png";
let foodLoaded=false;
foodImg.onload=()=>foodLoaded=true;

function spawnFood(){
let f;
do{
f={x:Math.floor(Math.random()*grid)*box,y:Math.floor(Math.random()*grid)*box};
}while(snake.some(p=>p.x===f.x&&p.y===f.y));
return f;
}

function resetGame(){
snake=[{x:box*5,y:box*5}];
dx=dy=nextDx=nextDy=0;
score=0;
speed=140;
running=false;
paused=false;
gameOver=false;
food=spawnFood();
updateUI();
draw();
}

function startGame(){
if(gameOver)resetGame();
running=true;
paused=false;
if(!loopId){last=performance.now();loopId=requestAnimationFrame(loop);}
}

function pauseGame(){paused=!paused}

function loop(t){
const d=t-last;last=t;
if(running&&!paused&&!gameOver){
acc+=d;
while(acc>speed){update();acc-=speed;}
}
draw();
loopId=requestAnimationFrame(loop);
}

function update(){
if(nextDx===0&&nextDy===0)return;
dx=nextDx;dy=nextDy;
const head={x:snake[0].x+dx,y:snake[0].y+dy};

if(head.x<0||head.y<0||head.x>=size||head.y>=size||snake.some(p=>p.x===head.x&&p.y===head.y)){
gameOver=true;running=false;
document.getElementById("finalScore").innerText="分數："+score;
document.getElementById("modal").classList.add("show");
return;
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
score++;
food=spawnFood();
speed=Math.max(60,speed-5);
}else snake.pop();

updateUI();
}

function updateUI(){
if(score>best){best=score;localStorage.setItem("best",best);}
scoreEl.innerText=score;
bestEl.innerText=best;
speedEl.innerText=(140/speed).toFixed(1)+"x";
}

function draw(){
ctx.clearRect(0,0,size,size);

ctx.strokeStyle="rgba(255,255,255,.05)";
for(let i=0;i<grid;i++){
ctx.beginPath();ctx.moveTo(i*box,0);ctx.lineTo(i*box,size);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,i*box);ctx.lineTo(size,i*box);ctx.stroke();
}

if(foodLoaded){
ctx.drawImage(foodImg,food.x+2,food.y+2,box-4,box-4);
}else{
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(food.x+box/2,food.y+box/2,box/3,0,Math.PI*2);
ctx.fill();
}

snake.forEach((p,i)=>{
if(snakeLoaded){
ctx.save();
ctx.translate(p.x+box/2,p.y+box/2);
let angle=0;
if(dx===box)angle=0;
if(dx===-box)angle=Math.PI;
if(dy===box)angle=Math.PI/2;
if(dy===-box)angle=-Math.PI/2;
ctx.rotate(angle);
ctx.drawImage(snakeImg,-box/2+2,-box/2+2,box-4,box-4);
ctx.restore();
}else{
ctx.fillStyle="#00ff88";
ctx.fillRect(p.x+2,p.y+2,box-4,box-4);
}
});
}

let sx,sy;
canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchend",e=>{
const ex=e.changedTouches[0].clientX;
const ey=e.changedTouches[0].clientY;
const dxs=ex-sx,dys=ey-sy;

if(Math.abs(dxs)<30&&Math.abs(dys)<30)return;

let ndx=0,ndy=0;
if(Math.abs(dxs)>Math.abs(dys))ndx=dxs>0?box:-box;
else ndy=dys>0?box:-box;

if(dx+ndx===0&&dy+ndy===0)return;

nextDx=ndx;nextDy=ndy;
if(!running)startGame();
},{passive:false});

function closeModal(){
document.getElementById("modal").classList.remove("show");
resetGame();
}

resetGame();
</script>
</body>
</html>
