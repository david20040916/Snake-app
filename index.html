<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Meme God Pro MAX</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
height:100%;overflow:hidden;
touch-action:none;
overscroll-behavior:none;
background:#020617;
font-family:sans-serif;color:#fff;
}
body{
display:flex;justify-content:center;align-items:center;
background:
radial-gradient(circle at 20% 10%, rgba(56,189,248,.4), transparent 30%),
radial-gradient(circle at 80% 20%, rgba(168,85,247,.35), transparent 30%),
#020617;
}
.app{width:100%;max-width:430px;text-align:center}
h1{margin:10px;text-shadow:0 0 15px #38bdf8}

canvas{
width:min(96vw,430px);
height:min(96vw,430px);
border-radius:20px;
border:3px solid #38bdf8;
box-shadow:0 0 25px #38bdf8;
background:#000;
}

.hud{display:flex;justify-content:space-around;margin:10px}
.card{background:rgba(255,255,255,.1);padding:10px;border-radius:12px}
button{
margin:5px;padding:10px;border:none;border-radius:12px;
background:linear-gradient(135deg,#2563eb,#38bdf8);color:#fff
}
button:active{transform:scale(.9)}
</style>
</head>

<body>
<div class="app">
<h1>🐍 Snake Meme God Pro MAX</h1>

<div class="hud">
<div class="card">分數<br><b id="score">0</b></div>
<div class="card">最高<br><b id="best">0</b></div>
<div class="card">速度<br><b id="spd">1x</b></div>
</div>

<canvas id="c"></canvas>

<div>
<button onclick="start()">開始</button>
<button onclick="pause()">暫停</button>
<button onclick="reset()">重開</button>
</div>
</div>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

const c=document.getElementById("c");
const ctx=c.getContext("2d");

const SIZE=420;
c.width=SIZE;c.height=SIZE;
const BOX=24;
const GRID=SIZE/BOX;

let snake=[{x:5*BOX,y:5*BOX}];
let dx=0,dy=0,ndx=0,ndy=0;
let food;
let score=0;
let best=+localStorage.getItem("best")||0;
let speed=140;
let run=false,pauseFlag=false,over=false;
let acc=0,last=0;

const snakeImg=new Image();
snakeImg.src="snake.png";

const foodImg=new Image();
foodImg.src="food.png";

function spawn(){
let f;
do{
f={x:Math.floor(Math.random()*GRID)*BOX,y:Math.floor(Math.random()*GRID)*BOX};
}while(snake.some(p=>p.x===f.x&&p.y===f.y));
return f;
}

function reset(){
snake=[{x:5*BOX,y:5*BOX}];
dx=dy=ndx=ndy=0;
score=0;
speed=140;
run=false;pauseFlag=false;over=false;
food=spawn();
ui();
draw();
}

function start(){if(over)reset();run=true}
function pause(){pauseFlag=!pauseFlag}

function loop(t){
const d=t-last;last=t;
if(run&&!pauseFlag&&!over){
acc+=d;
while(acc>speed){update();acc-=speed;}
}
draw();
requestAnimationFrame(loop);
}

function update(){
if(ndx===0&&ndy===0)return;
dx=ndx;dy=ndy;

const head={x:snake[0].x+dx,y:snake[0].y+dy};

if(head.x<0||head.y<0||head.x>=SIZE||head.y>=SIZE||snake.some(p=>p.x===head.x&&p.y===head.y)){
over=true;run=false;
navigator.vibrate?.(200);
return;
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
score++;
speed=Math.max(60,speed-5);
food=spawn();
navigator.vibrate?.(50);
}else snake.pop();

ui();
}

function ui(){
if(score>best){best=score;localStorage.setItem("best",best)}
scoreEl.innerText=score;
bestEl.innerText=best;
spd.innerText=(140/speed).toFixed(1)+"x";
}

function draw(){
ctx.clearRect(0,0,SIZE,SIZE);

// grid
ctx.strokeStyle="rgba(255,255,255,.05)";
for(let i=0;i<GRID;i++){
ctx.beginPath();ctx.moveTo(i*BOX,0);ctx.lineTo(i*BOX,SIZE);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,i*BOX);ctx.lineTo(SIZE,i*BOX);ctx.stroke();
}

// food
if(foodImg.complete){
ctx.drawImage(foodImg,food.x+2,food.y+2,BOX-4,BOX-4);
}else{
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(food.x+BOX/2,food.y+BOX/2,BOX/3,0,Math.PI*2);
ctx.fill();
}

// snake
snake.forEach((p,i)=>{
ctx.save();
ctx.translate(p.x+BOX/2,p.y+BOX/2);

let ang=0;
if(dx===BOX)ang=0;
if(dx===-BOX)ang=Math.PI;
if(dy===BOX)ang=Math.PI/2;
if(dy===-BOX)ang=-Math.PI/2;
ctx.rotate(ang);

if(snakeImg.complete){
if(i===0){
ctx.shadowColor="#00ffff";
ctx.shadowBlur=20;
ctx.drawImage(snakeImg,-BOX/2,-BOX/2,BOX,BOX);
}else{
ctx.globalAlpha=.6;
ctx.drawImage(snakeImg,-BOX/2+4,-BOX/2+4,BOX-8,BOX-8);
}
}else{
ctx.fillStyle="#0f0";
ctx.fillRect(-BOX/2,-BOX/2,BOX,BOX);
}
ctx.restore();
});
}

// swipe
let sx,sy;
c.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
},{passive:false});

c.addEventListener("touchend",e=>{
const ex=e.changedTouches[0].clientX;
const ey=e.changedTouches[0].clientY;
const dxs=ex-sx,dys=ey-sy;

if(Math.abs(dxs)<30&&Math.abs(dys)<30)return;

let x=0,y=0;
if(Math.abs(dxs)>Math.abs(dys))x=dxs>0?BOX:-BOX;
else y=dys>0?BOX:-BOX;

if(dx+x===0&&dy+y===0)return;

ndx=x;ndy=y;
if(!run)start();
},{passive:false});

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
