<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Neon Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:sans-serif;
  background:radial-gradient(circle at top,#1e293b,#020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.app{
  width:100%;
  max-width:420px;
  padding:16px;
  text-align:center;
}
h1{font-size:26px;margin-bottom:10px}
.glass{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:14px;
  padding:10px;
  margin-bottom:10px;
}
.stats{display:flex;gap:8px}
.stats div{flex:1}
canvas{
  width:100%;
  max-width:360px;
  height:360px;
  background:#020617;
  border:3px solid #38bdf8;
  border-radius:16px;
  margin:10px auto;
  display:block;
  box-shadow:0 0 20px #38bdf8;
}
.controls{display:flex;gap:8px;margin-top:10px}
button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:#2563eb;
  color:white;
}
button:active{transform:scale(0.95)}
.colors{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}
.color{
  width:24px;height:24px;border-radius:50%;
  border:2px solid white;
}
</style>
</head>

<body>
<div class="app">

<h1>🐍 Snake Neon Pro</h1>

<div class="stats">
<div class="glass">分數<br><b id="score">0</b></div>
<div class="glass">最高<br><b id="best">0</b></div>
</div>

<canvas id="game" width="360" height="360"></canvas>

<div class="controls">
<button onclick="startGame()">開始</button>
<button onclick="pauseGame()">暫停</button>
<button onclick="resetGame()">重開</button>
</div>

<div class="glass">
蛇顏色
<div class="colors" id="colors"></div>
<input type="color" id="customColor">
</div>

</div>

<script>
// PWA
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const box=20;
const size=360;
const grid=size/box;

let snake,food,dx,dy,score,best,running,paused,speed,loopId;
let color=localStorage.getItem("snakeColor")||"#00ff88";

const preset=["#00ff88","#00ccff","#a855f7","#ff00cc","#ffd700","#ff3333","#00ffff","#ffffff"];

const colorsDiv=document.getElementById("colors");
preset.forEach(c=>{
  const el=document.createElement("div");
  el.className="color";
  el.style.background=c;
  el.onclick=()=>{
    color=c;
    localStorage.setItem("snakeColor",c);
  };
  colorsDiv.appendChild(el);
});

document.getElementById("customColor").oninput=e=>{
  color=e.target.value;
  localStorage.setItem("snakeColor",color);
};

best=localStorage.getItem("best")||0;

function resetGame(){
  snake=[{x:160,y:160}];
  dx=0;dy=0;
  score=0;
  speed=150;
  running=false;
  paused=false;
  food=spawnFood();
  updateUI();
  draw();
}

function spawnFood(){
  let f;
  do{
    f={
      x:Math.floor(Math.random()*grid)*box,
      y:Math.floor(Math.random()*grid)*box
    };
  }while(snake.some(p=>p.x===f.x&&p.y===f.y));
  return f;
}

function startGame(){
  if(loopId)cancelAnimationFrame(loopId);
  running=true;
  paused=false;
  loop();
}

function pauseGame(){
  paused=!paused;
}

function updateUI(){
  if(score>best){
    best=score;
    localStorage.setItem("best",best);
  }
  document.getElementById("score").innerText=score;
  document.getElementById("best").innerText=best;
}

let last=0,acc=0;

function loop(time=0){
  const delta=time-last;
  last=time;
  if(running&&!paused){
    acc+=delta;
    if(acc>speed){
      update();
      acc=0;
    }
  }
  draw();
  loopId=requestAnimationFrame(loop);
}

function update(){
  if(dx===0&&dy===0)return;

  const head={x:snake[0].x+dx,y:snake[0].y+dy};

  if(
    head.x<0||head.x>=size||
    head.y<0||head.y>=size||
    snake.some(p=>p.x===head.x&&p.y===head.y)
  ){
    navigator.vibrate?.(200);
    alert("Game Over："+score);
    resetGame();
    return;
  }

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    score++;
    playSound(600);
    navigator.vibrate?.(50);
    food=spawnFood();
    if(speed>60)speed-=5;
  }else{
    snake.pop();
  }

  updateUI();
}

function draw(){
  ctx.clearRect(0,0,size,size);

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,box,box);

  ctx.fillStyle=color;
  snake.forEach(p=>{
    ctx.fillRect(p.x,p.y,box,box);
  });
}

// swipe
let sx,sy;
canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
  const ex=e.changedTouches[0].clientX;
  const ey=e.changedTouches[0].clientY;

  const dxs=ex-sx;
  const dys=ey-sy;

  if(Math.abs(dxs)<20&&Math.abs(dys)<20)return;

  if(Math.abs(dxs)>Math.abs(dys)){
    if(dxs>0&&dx!==-box){dx=box;dy=0;}
    else if(dxs<0&&dx!==box){dx=-box;dy=0;}
  }else{
    if(dys>0&&dy!==-box){dx=0;dy=box;}
    else if(dys<0&&dy!==box){dx=0;dy=-box;}
  }
});

function playSound(freq){
  try{
    const a=new AudioContext();
    const o=a.createOscillator();
    const g=a.createGain();
    o.frequency.value=freq;
    o.connect(g);
    g.connect(a.destination);
    g.gain.value=0.05;
    o.start();
    setTimeout(()=>{o.stop();a.close();},100);
  }catch{}
}

resetGame();
</script>
</body>
</html>
